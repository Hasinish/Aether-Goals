<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Cyan to Emerald Gradient matching the app's premium breathing theme -->
    <linearGradient id="aether-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
    
    <!-- Outer Glow Filter for premium emissive look -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Deep Black Premium Rounded Base (keeps high contrast in dark/light browser tabs) -->
  <rect width="512" height="512" rx="128" fill="#000000"/>
  
  <!-- Outer glowing target tracking ring -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="url(#aether-glow)" stroke-width="4" opacity="0.2"/>
  
  <!-- Sleek Segmented Outer Arc (representing goal/progress segments) -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="url(#aether-glow)" stroke-width="8" stroke-dasharray="120 30 80 40 40 20" stroke-linecap="round" filter="url(#glow)"/>
  
  <!-- Fine High-Tech Crosshair Lines -->
  <line x1="256" y1="40" x2="256" y2="472" stroke="#ffffff" stroke-width="2" opacity="0.15" />
  <line x1="40" y1="256" x2="472" y2="256" stroke="#ffffff" stroke-width="2" opacity="0.15" />
  
  <!-- Glowing Target Center Node -->
  <circle cx="256" cy="256" r="60" fill="none" stroke="url(#aether-glow)" stroke-width="12" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="24" fill="#ffffff" filter="url(#glow)"/>
  
  <!-- Precision Target Tick Markers -->
  <line x1="256" y1="120" x2="256" y2="140" stroke="#ffffff" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
  <line x1="256" y1="372" x2="256" y2="392" stroke="#ffffff" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
  <line x1="120" y1="256" x2="140" y2="256" stroke="#ffffff" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
  <line x1="372" y1="256" x2="392" y2="256" stroke="#ffffff" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
</svg>
