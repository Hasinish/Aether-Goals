<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#000000"/>
  
  <!-- Outer glowing ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#262626" stroke-width="8"/>
  
  <!-- Inner Segmented Track -->
  <circle cx="256" cy="256" r="130" fill="none" stroke="#ffffff" stroke-width="12" stroke-dasharray="20 10"/>
  
  <!-- Center Bullseye/Arrow Indicator -->
  <circle cx="256" cy="256" r="50" fill="#ffffff"/>
  
  <!-- Sleek Target Marker -->
  <line x1="256" y1="40" x2="256" y2="100" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>
  <line x1="256" y1="412" x2="256" y2="472" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>
  <line x1="40" y1="256" x2="100" y2="256" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>
  <line x1="412" y1="256" x2="472" y2="256" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>
</svg>
